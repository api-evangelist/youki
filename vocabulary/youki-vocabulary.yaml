    operations:
      - "update"
      - "create"
    schemas:
      - "LinuxConfig"
    workflows:
      - "kubernetes-via-containerd"
      - "secure-multi-tenant"
      - "rootless-containers"
    personas:
      - "platform-engineer"
      - "security-engineer"

  - resource: "namespace"
    api: "youki:youki"
    operations:
      - "create"
    schemas:
      - "LinuxConfig"
    workflows:
      - "rootless-containers"
      - "secure-multi-tenant"
    personas:
      - "security-engineer"
      - "platform-engineer"

  - resource: "seccomp-profile"
    api: "youki:youki"
    operations:
      - "create"
    schemas:
      - "LinuxConfig"
    workflows:
      - "secure-multi-tenant"
      - "runtime-research"
    personas:
      - "security-engineer"
      - "researcher"

  - resource: "capability"
    api: "youki:youki"
    schemas:
      - "OciRuntimeConfig"
    workflows:
      - "secure-multi-tenant"
      - "rootless-containers"
    personas:
      - "security-engineer"
      - "platform-engineer"

  - resource: "mount"
    api: "youki:youki"
    schemas:
      - "OciRuntimeConfig"
      - "Mount"
    workflows:
      - "drop-in-runc"
      - "rootless-containers"
      - "kubernetes-via-containerd"
    personas:
      - "developer"
      - "platform-engineer"

  - resource: "hook"
    api: "youki:youki"
    schemas:
